services:
  # SvelteKit 개발 서버 (핫리로드)
  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
      target: development
      args:
        DEV_PORT: 3010
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: angple-web-dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env.dev
    ports:
      - "3010:3010"
    volumes:
      # 프로젝트 루트 전체 마운트
      - ./:/app
    environment:
      - NODE_ENV=development
      - DEV_PORT=3010
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # 개발용 API 엔드포인트 (개발 백엔드 사용)
      - PUBLIC_API_URL=http://localhost:8083
    restart: unless-stopped
    networks:
      - angple-dev-network

networks:
  angple-dev-network:
    name: angple-dev-network
    external: true
