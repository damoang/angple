name: Safari Synthetic

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

env:
  NODE_VERSION: '22'

jobs:
  mobile-safari-synthetic:
    name: Mobile Safari Synthetic
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps webkit

      - name: Run Mobile Safari synthetic monitor
        working-directory: apps/web
        env:
          E2E_EXTERNAL_BASE_URL: https://damoang.net
          E2E_SYNTHETIC_POST_PATH: /free/5998999
        run: pnpm exec playwright test --config=playwright.synthetic.config.ts

      - name: Upload synthetic report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-safari-synthetic
          path: apps/web/playwright-report-synthetic/
          retention-days: 7

  notify:
    name: Notify Telegram
    needs: mobile-safari-synthetic
    if: always() && needs.mobile-safari-synthetic.result == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚨 *Safari Synthetic failure*%0A%0AWorkflow: ${{ github.workflow }}%0ABranch: ${{ github.ref_name }}%0AEvent: ${{ github.event_name }}%0A%0A[Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
