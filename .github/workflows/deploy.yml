name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/damoang/angple-web
  STATIC_ASSET_BASE_ROOT: https://static.damoang.net/releases
  MEDIA_CDN_BASE: https://cdn.damoang.net

concurrency:
  group: deploy-main-web
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      image_repo: ${{ env.IMAGE_NAME }}
      image_digest: ${{ steps.build_image.outputs.digest }}
      pr_title: ${{ steps.pr.outputs.pr_title }}
      pr_title_b64: ${{ steps.pr.outputs.pr_title_b64 }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - name: Checkout premium
        uses: actions/checkout@v6
        with:
          repository: damoang/angple-premium
          token: ${{ secrets.PREMIUM_REPO_TOKEN }}
          path: _premium

      - name: Install premium assets
        run: |
          chmod +x _premium/deploy/install.sh
          _premium/deploy/install.sh .

      - name: Setup directories
        run: mkdir -p custom-themes custom-widgets extensions plugins widgets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm fetch --frozen-lockfile
          pnpm install --frozen-lockfile --prefer-offline

      - name: Build
        env:
          VITE_USE_MOCK: 'false'
          VITE_GAM_NETWORK_CODE: '23338387889'
          VITE_GAM_SITE_NAME: 'damoang'
          VITE_S3_URL: ${{ env.MEDIA_CDN_BASE }}
        run: |
          pnpm --filter "./packages/*" build
          echo "VITE_GAM_NETWORK_CODE=23338387889" > apps/web/.env
          echo "VITE_GAM_SITE_NAME=damoang" >> apps/web/.env
          echo "VITE_S3_URL=${VITE_S3_URL}" >> apps/web/.env
          pnpm --filter web build

      - name: Set image tags
        id: tags
        run: echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve PR info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_json=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" -H "Accept: application/vnd.github+json" 2>/dev/null || echo '[]')
          pr_title=$(printf '%s' "$pr_json" | jq -r '.[0].title // empty')
          pr_url=$(printf '%s' "$pr_json" | jq -r '.[0].html_url // empty')

          {
            echo "pr_title<<EOF"
            printf '%s\n' "$pr_title"
            echo "EOF"
            echo "pr_url=${pr_url}"
            echo "pr_title_b64=$(printf '%s' "$pr_title" | base64 -w0)"
          } >> "$GITHUB_OUTPUT"

      - name: Upload immutable assets to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          SHA_TAG: ${{ steps.tags.outputs.sha_tag }}
        run: |
          for name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY R2_ACCOUNT_ID R2_BUCKET SHA_TAG; do
            if [ -z "${!name}" ]; then
              echo "Missing required R2 variable: $name"
              exit 1
            fi
          done

          aws s3 sync apps/web/build/client/_app/immutable/ \
            "s3://${R2_BUCKET}/releases/${SHA_TAG}/_app/immutable/" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-progress

      - name: Prepare deploy package
        run: |
          pnpm --filter web deploy --prod --legacy apps/web/deploy
          cp -r apps/web/build apps/web/deploy/
          rm -rf apps/web/deploy/{plugins,widgets,themes,custom-themes,custom-widgets,extensions}
          for dir in plugins widgets themes custom-themes custom-widgets extensions; do
            [ -d "$dir" ] && cp -r "$dir" apps/web/deploy/
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: apps/web/deploy
          file: apps/web/Dockerfile.prod
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: canary
      url: https://canary.damoang.net
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Deploy canary via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
          APPROVAL_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ASSET_BASE_URL: ${{ env.STATIC_ASSET_BASE_ROOT }}/${{ needs.build.outputs.sha_tag }}
          PR_URL: ${{ needs.build.outputs.pr_url }}
          PR_TITLE_B64: ${{ needs.build.outputs.pr_title_b64 }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "{
              \"commands\": [
                \"export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' TELEGRAM_DEPLOY_CHAT_ID='${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}' DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/1435940653375815730/${{ secrets.DISCORD_WEBHOOK_TOKEN_WEB }}' APPROVAL_URL='${APPROVAL_URL}' ASSET_BASE_URL='${ASSET_BASE_URL}' PR_URL='${PR_URL}' PR_TITLE_B64='${PR_TITLE_B64}' && /home/angple/k8s/prod/deploy.sh web $IMAGE_TAG --canary-only\"
              ]
            }" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text 2>&1)

          if [ -z "$COMMAND_ID" ] || [[ "$COMMAND_ID" == *"error"* ]]; then
            echo "❌ SSM send-command failed: $COMMAND_ID"
            exit 1
          fi

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Canary deployed"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "----- SSM STDOUT -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              echo "----- SSM STDERR -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Notify Discord (Canary)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "3066993" || echo "15158332")
          curl -X POST "https://discord.com/api/webhooks/1435940653375815730/${{ secrets.DISCORD_WEBHOOK_TOKEN_WEB }}" -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"🚀 Canary Deploy $STATUS\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Tag\", \"value\": \"\`${{ needs.build.outputs.sha_tag }}\`\"},
                {\"name\": \"URL\", \"value\": \"https://canary.damoang.net\"}
              ]
            }]
          }"

  verify-canary:
    needs: [build, deploy-canary]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Verify canary endpoints (via SSM)
        run: |
          cat > /tmp/web-canary-verify-params.json <<'JSON'
          {
            "commands": [
              "set -eu",
              "BASE='http://127.0.0.1:30082'",
              "HDR='x-real-ip: 127.0.0.1'",
              "for i in 1 2 3 4 5 6; do",
              "  echo \"VERIFY ROUND ${i}\"",
              "  code=$(curl -sS -H \"${HDR}\" -o /tmp/canary-health.out -w \"%{http_code}\" --max-time 10 \"${BASE}/health\")",
              "  echo \"CHECK /health -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/canary-health.out; exit 1; }",
              "  code=$(curl -sS -H \"${HDR}\" -o /tmp/canary-root.out -w \"%{http_code}\" --max-time 10 \"${BASE}/\")",
              "  echo \"CHECK / -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/canary-root.out; exit 1; }",
              "  code=$(curl -sS -H \"${HDR}\" -o /tmp/canary-free.out -w \"%{http_code}\" --max-time 10 \"${BASE}/free\")",
              "  echo \"CHECK /free -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/canary-free.out; exit 1; }",
              "  code=$(curl -sS -H \"${HDR}\" -o /tmp/canary-posts.out -w \"%{http_code}\" --max-time 10 \"${BASE}/api/v1/boards/free/posts?page=1&limit=5\")",
              "  echo \"CHECK /api/v1/boards/free/posts?page=1&limit=5 -> ${code}\"",
              "  [ \"${code}\" = \"200\" ] || { cat /tmp/canary-posts.out; exit 1; }",
              "  grep -q '\"data\"' /tmp/canary-posts.out || { cat /tmp/canary-posts.out; exit 1; }",
              "  echo \"MATCH /api/v1/boards/free/posts?page=1&limit=5 -> \\\"data\\\"\"",
              "  sleep 5",
              "done"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/web-canary-verify-params.json \
            --timeout-seconds 180 \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Canary verification passed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "❌ Canary verification failed"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Notify Telegram (Approval)
        if: success()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="✅ angple web canary verified%0A%0ARepo: ${{ github.repository }}%0ACommit: ${{ github.sha }}%0ATag: \`${{ needs.build.outputs.sha_tag }}\`%0ADigest: \`${{ needs.build.outputs.image_digest }}\`"
          if [ -n "${{ needs.build.outputs.pr_url }}" ]; then
            TEXT="${TEXT}%0APR: ${{ needs.build.outputs.pr_title }}%0ALink: ${{ needs.build.outputs.pr_url }}"
          fi
          TEXT="${TEXT}%0ACanary: https://canary.damoang.net%0AGate Approval: ${RUN_URL}%0A%0ACanary 검증 통과 후 Environment approval 을 하면 production 배포가 진행됩니다."
          BUTTONS='[[{"text":"Canary 열기","url":"https://canary.damoang.net"},{"text":"Gate Approval","url":"'"${RUN_URL}"'"}]]'
          if [ -n "${{ needs.build.outputs.pr_url }}" ]; then
            BUTTONS='[[{"text":"Canary 열기","url":"https://canary.damoang.net"},{"text":"Gate Approval","url":"'"${RUN_URL}"'"},{"text":"PR 보기","url":"${{ needs.build.outputs.pr_url }}"}]]'
          fi
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "reply_markup={\"inline_keyboard\":${BUTTONS}}"

  deploy-production:
    needs: [build, deploy-canary, verify-canary]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://damoang.net
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::891376997084:role/GitHubActionsDeployRole
          aws-region: ap-northeast-2

      - name: Deploy production via SSM
        env:
          IMAGE_TAG: ${{ needs.build.outputs.sha_tag }}
          ASSET_BASE_URL: ${{ env.STATIC_ASSET_BASE_ROOT }}/${{ needs.build.outputs.sha_tag }}
          PR_URL: ${{ needs.build.outputs.pr_url }}
          PR_TITLE_B64: ${{ needs.build.outputs.pr_title_b64 }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-038a1d1f00798d94b" \
            --document-name "AWS-RunShellScript" \
            --parameters "{
              \"commands\": [
                \"export GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' TELEGRAM_DEPLOY_CHAT_ID='${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}' DISCORD_WEBHOOK_URL='https://discord.com/api/webhooks/1435940653375815730/${{ secrets.DISCORD_WEBHOOK_TOKEN_WEB }}' ASSET_BASE_URL='${ASSET_BASE_URL}' PR_URL='${PR_URL}' PR_TITLE_B64='${PR_TITLE_B64}' && /home/angple/k8s/prod/deploy.sh web $IMAGE_TAG --skip-canary\"
              ]
            }" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text 2>&1)

          if [ -z "$COMMAND_ID" ] || [[ "$COMMAND_ID" == *"error"* ]]; then
            echo "❌ SSM send-command failed: $COMMAND_ID"
            exit 1
          fi

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "i-038a1d1f00798d94b" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Production deployed"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "----- SSM STDOUT -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardOutputContent" \
                --output text || true
              echo "----- SSM STDERR -----"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "i-038a1d1f00798d94b" \
                --query "StandardErrorContent" \
                --output text || true
              exit 1
            fi
            sleep 5
          done
          echo "Timeout"
          exit 1

      - name: Notify Telegram (Production)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "🎉" || echo "❌")
          TEXT="${EMOJI} angple web production ${STATUS}%0A%0ATag: \`${{ needs.build.outputs.sha_tag }}\`%0ADigest: \`${{ needs.build.outputs.image_digest }}\`"
          if [ -n "${{ needs.build.outputs.pr_url }}" ]; then
            TEXT="${TEXT}%0APR: ${{ needs.build.outputs.pr_title }}%0ALink: ${{ needs.build.outputs.pr_url }}"
          fi
          TEXT="${TEXT}%0AURL: https://damoang.net"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_DEPLOY_CHAT_ID }}" \
            -d "text=${TEXT}"
