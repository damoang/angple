name: Security Scans

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    # 매주 월요일 18:00 KST (= UTC 09:00)
    - cron: '0 9 * * 1'

env:
  NODE_VERSION: "24.11.1"

jobs:
  # 빠른 SAST 검사 - 정보 제공용 (blocking 아님)
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep
        continue-on-error: true
        run: semgrep ci --config=auto

  # 심층 SAST 검사는 무거우므로 수동 실행 또는 정기 스캔으로만 돌린다.
  sast-codeql:
    name: SAST - CodeQL
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # 컨테이너 보안 스캔도 main 배포 경로를 막지 않도록 수동/정기 실행으로만 돌린다.
  container-scan:
    name: Container Security Scan
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docker image
        run: docker build -f apps/web/Dockerfile -t angple-web:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: angple-web:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # 시크릿 스캐닝 - Gitleaks (MIT 라이선스 CLI 직접 실행)
  secret-scan:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          RELEASE_JSON=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest)
          ASSET_URL=$(printf '%s' "$RELEASE_JSON" | grep -o 'https://[^"]*gitleaks_[^"]*_linux_x64\.tar\.gz' | head -n1)
          test -n "$ASSET_URL"
          curl -fsSL "$ASSET_URL" | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source=. -v
