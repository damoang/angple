<!doctype html>
<html lang="ko">
    <head>
        <meta charset="utf-8" />
        <!--
          #989 fix: iOS Safari는 짧은 시간 내 연속 history 쓰기(replaceState→pushState)를
          한 틱으로 병합해, list→detail pushState가 새 엔트리 대신 현재 엔트리를 덮어쓴다
          (빠른 탭→뒤로가기 시 목록을 건너뛰고 about:blank로 이탈).
          쓰기 직후 history.length를 동기 read하면 WebKit이 엔트리를 즉시 commit하여 병합을 막는다.
          SvelteKit은 history.pushState/replaceState를 호출 시점에 live로 참조하므로(클라이언트
          번들보다 먼저 실행되는) 이 래퍼가 내부 내비게이션에도 적용된다.
        -->
        <script>
            (function () {
                if (typeof history === 'undefined') return;
                var op = history.pushState;
                var or = history.replaceState;
                if (typeof op !== 'function' || typeof or !== 'function') return;
                history.pushState = function () {
                    var r = op.apply(this, arguments);
                    void history.length; // force WebKit to flush/commit the new entry
                    return r;
                };
                history.replaceState = function () {
                    var r = or.apply(this, arguments);
                    void history.length;
                    return r;
                };
            })();
        </script>
        <script>
            // 테마 모드 즉시 적용 (FOUC 방지 — CSS 파싱보다 먼저 실행)
            // 1순위: 쿠키 (SSR과 동일한 소스)
            // 2순위: localStorage (기존 사용자 호환)
            // 3순위: prefers-color-scheme (첫 방문자)
            (function () {
                var c = document.cookie.match(/angple_theme_mode=(\w+)/);
                var m = c ? c[1] : null;
                // fromStore: m 이 '명시적으로 저장된 선택'(쿠키/localStorage)에서 왔는지 여부.
                // prefers-color-scheme 로 파생된 dark 는 fromStore=false → 쿠키에 박제하지 않는다.
                var fromStore = !!m;
                if (!m) {
                    try {
                        var lm = localStorage.getItem('themeMode');
                        if (lm) {
                            m = lm;
                            fromStore = true;
                        } else if (localStorage.getItem('darkMode') === 'true') {
                            m = 'dark';
                            fromStore = true;
                        }
                    } catch (e) {}
                }
                if (!m && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    m = 'dark';
                }
                if (m === 'dark') document.documentElement.classList.add('dark');
                else if (m === 'amoled') document.documentElement.classList.add('amoled');
                // SSR 동기화용 쿠키는 '명시적으로 저장된' dark/amoled 만 기록한다(1년 만료).
                // prefers 파생 dark 를 기록하면 시스템 모드가 dark 로 영구 고정된다(#12886).
                if (fromStore && (m === 'dark' || m === 'amoled')) {
                    document.cookie =
                        'angple_theme_mode=' + m + ';path=/;max-age=31536000;SameSite=Lax';
                }
            })();
            // UI 밀도 즉시 적용 (SSR과 동일한 CSS 변수 설정)
            (function () {
                var c = document.cookie.match(/angple_ui_density=(\w+)/);
                var d = c ? c[1] : null;
                if (!d) {
                    try {
                        d = localStorage.getItem('angple_ui_density');
                    } catch (e) {}
                }
                if (d !== 'compact' && d !== 'balanced' && d !== 'relaxed') d = 'balanced';
                var p = d === 'compact' ? '0px' : d === 'relaxed' ? '6px' : '3px';
                var s = document.documentElement.style;
                s.setProperty('--row-pad-extra', p);
                s.setProperty('--comment-pad-extra', p);
                if (d !== 'balanced') {
                    document.cookie =
                        'angple_ui_density=' + d + ';path=/;max-age=31536000;SameSite=Lax';
                }
            })();
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- 초기 부트스트랩 import 실패도 잡기 위해 head에서 먼저 설치 -->
        <script>
            (function () {
                // dev 환경에서는 청크 에러 핸들러 비활성화 (HMR이 chunk error를 유발)
                if (location.hostname === 'localhost' || location.hostname.startsWith('dev.')) {
                    window.__angpleChunkError = {
                        getState: function () {
                            return { count: 0, ts: 0, exhausted: false };
                        },
                        handle: function () {}
                    };
                    return;
                }
                var KEY = '__angple_chunk_error__';
                var MAX_RELOADS = 2;
                var WINDOW_MS = 60000;

                function getState() {
                    try {
                        var raw = sessionStorage.getItem(KEY);
                        if (raw) return JSON.parse(raw);
                    } catch (e) {}
                    return { count: 0, ts: 0, exhausted: false };
                }

                function setState(s) {
                    try {
                        sessionStorage.setItem(KEY, JSON.stringify(s));
                    } catch (e) {}
                }

                function isChunkError(msg) {
                    if (!msg) return false;
                    var m = msg.toLowerCase();
                    return (
                        m.indexOf('failed to fetch dynamically imported module') !== -1 ||
                        m.indexOf('importing a module script failed') !== -1 ||
                        m.indexOf('error loading dynamically imported module') !== -1 ||
                        m.indexOf('chunkloaderror') !== -1 ||
                        (m.indexOf('load') !== -1 && m.indexOf('chunk') !== -1)
                    );
                }

                function reloadWithCacheBust(clearCaches) {
                    function replaceNow() {
                        var url = new URL(location.href);
                        url.searchParams.set('_v', String(Date.now()));
                        location.replace(url.toString());
                    }

                    if (!clearCaches) {
                        replaceNow();
                        return;
                    }

                    var tasks = [];
                    if (navigator.serviceWorker) {
                        tasks.push(
                            navigator.serviceWorker.getRegistrations().then(function (regs) {
                                regs.forEach(function (r) {
                                    r.unregister();
                                });
                            })
                        );
                    }
                    if (window.caches) {
                        tasks.push(
                            caches.keys().then(function (names) {
                                return Promise.all(
                                    names.map(function (name) {
                                        return caches.delete(name);
                                    })
                                );
                            })
                        );
                    }

                    Promise.all(tasks).finally(replaceNow);
                }

                function handle() {
                    var s = getState();
                    var now = Date.now();
                    if (now - s.ts > WINDOW_MS) {
                        s = { count: 0, ts: now, exhausted: false };
                    }
                    s.count++;
                    s.ts = now;
                    if (s.count <= MAX_RELOADS) {
                        setState(s);
                        reloadWithCacheBust(s.count > 1);
                    } else {
                        s.exhausted = true;
                        setState(s);
                        try {
                            window.dispatchEvent(new CustomEvent('angple:chunk-error-exhausted'));
                        } catch (e) {}
                    }
                }

                window.__angpleChunkError = { getState: getState, handle: handle };

                window.addEventListener(
                    'error',
                    function (e) {
                        if (
                            e.target &&
                            (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') &&
                            (e.target.src || e.target.href || '').indexOf('/_app/immutable/') !== -1
                        ) {
                            handle();
                        }
                    },
                    true
                );

                window.addEventListener('unhandledrejection', function (e) {
                    if (e.reason && e.reason.message && isChunkError(e.reason.message)) {
                        handle();
                    }
                });

                window.addEventListener('load', function () {
                    setTimeout(function () {
                        var s = getState();
                        if (!s.exhausted) {
                            try {
                                sessionStorage.removeItem(KEY);
                            } catch (e) {}
                        }
                    }, 10000);
                });
            })();
        </script>
        %sveltekit.head%
        <!-- AdSense 로더 (광고 단위 미포함 — 표시/레이아웃 변화 없음) -->
        <script
            async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6922133409882969"
            crossorigin="anonymous"
        ></script>
        <!-- Microsoft Clarity (히트맵·세션 리플레이). async 로더라 렌더 블로킹 없음.
             clarity.ms 도메인은 hooks.server.ts CSP(script-src/connect-src)에 등록되어 있어야 로드됨. -->
        <script>
            (function (c, l, a, r, i, t, y) {
                c[a] =
                    c[a] ||
                    function () {
                        (c[a].q = c[a].q || []).push(arguments);
                    };
                t = l.createElement(r);
                t.async = 1;
                t.src = 'https://www.clarity.ms/tag/' + i;
                y = l.getElementsByTagName(r)[0];
                y.parentNode.insertBefore(t, y);
            })(window, document, 'clarity', 'script', 'xilbeyfaor');
        </script>
    </head>
    <body>
        <div style="display: contents">%sveltekit.body%</div>
        <!-- Safari bfcache 복원 시 stale 상태 방지 -->
        <script>
            window.addEventListener('pageshow', function (e) {
                if (e.persisted) {
                    // bfcache에서 복원됨 — SvelteKit 라우터 상태 갱신 위해 리로드
                    location.reload();
                }
            });
        </script>
        <!-- Raw JSON 감지: JS 로드 실패 시 __data.json이 화면에 표시되는 것 방지 -->
        <script>
            (function () {
                setTimeout(function () {
                    try {
                        var text = document.body.innerText;
                        if (!text) return;
                        var trimmed = text.trim();
                        if (
                            trimmed.indexOf('{"type":"data","nodes":[') === 0 ||
                            trimmed.indexOf('{"type":"redirect"') === 0
                        ) {
                            var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                            var bg = isDark ? '#111827' : '#f9fafb';
                            var fg = isDark ? '#f9fafb' : '#111827';
                            var cardBg = isDark ? '#1f2937' : '#fff';
                            var borderColor = isDark ? '#374151' : '#e5e7eb';
                            var btnBg = '#2563eb';
                            document.documentElement.innerHTML =
                                '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>페이지 로딩 오류</title></head>' +
                                '<body style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:' +
                                bg +
                                ';color:' +
                                fg +
                                ';padding:24px;margin:0">' +
                                '<div style="background:' +
                                cardBg +
                                ';border:1px solid ' +
                                borderColor +
                                ';border-radius:12px;padding:40px;max-width:480px;width:100%;text-align:center">' +
                                '<div style="font-size:48px;font-weight:700;color:#6b7280;margin-bottom:8px">!</div>' +
                                '<h1 style="font-size:20px;font-weight:600;margin-bottom:12px">페이지를 불러올 수 없습니다</h1>' +
                                '<p style="font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6">새 버전이 배포되어 페이지를 표시할 수 없습니다.<br>아래 버튼을 눌러 새로고침해 주세요.</p>' +
                                '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">' +
                                '<button onclick="location.reload()" style="padding:10px 20px;font-size:14px;font-weight:500;border-radius:8px;border:none;background:' +
                                btnBg +
                                ';color:#fff;cursor:pointer">새로고침</button>' +
                                "<button onclick=\"if(navigator.serviceWorker){navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})})};if(window.caches){caches.keys().then(function(n){n.forEach(function(k){caches.delete(k)})})};setTimeout(function(){location.replace(location.href.split('?')[0]+'?_v='+Date.now())},300)\" style=\"padding:10px 20px;font-size:14px;font-weight:500;border-radius:8px;border:1px solid " +
                                borderColor +
                                ';background:transparent;color:' +
                                fg +
                                ';cursor:pointer">캐시 삭제 후 새로고침</button>' +
                                '</div></div></body>';
                        }
                    } catch (e) {}
                }, 500);
            })();
        </script>
        <script>
            if ('serviceWorker' in navigator) {
                if (location.hostname === 'localhost' || location.hostname.startsWith('dev.')) {
                    // dev 환경: SW 해제 + Cache Storage 전체 삭제
                    navigator.serviceWorker.getRegistrations().then(function (regs) {
                        regs.forEach(function (r) {
                            r.unregister();
                        });
                    });
                    caches.keys().then(function (names) {
                        names.forEach(function (name) {
                            caches.delete(name);
                        });
                    });
                } else {
                    // 운영 환경: SW 등록 + 배포 감지 시 캐시 자동 정리
                    navigator.serviceWorker.register('/sw.js').then(function (reg) {
                        // 새 SW 발견 시 즉시 활성화
                        reg.addEventListener('updatefound', function () {
                            var newSw = reg.installing;
                            if (newSw) {
                                newSw.addEventListener('statechange', function () {
                                    if (newSw.state === 'activated') {
                                        // 새 SW 활성화 → 오래된 캐시 전체 정리
                                        caches.keys().then(function (names) {
                                            names.forEach(function (name) {
                                                caches.delete(name);
                                            });
                                        });
                                    }
                                });
                            }
                        });
                    });
                    // 페이지 로드 시마다 SW 업데이트 확인
                    navigator.serviceWorker.ready.then(function (reg) {
                        reg.update();
                    });
                }
            }
        </script>
    </body>
</html>
